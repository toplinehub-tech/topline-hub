<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopLineHub | Gestão Integrada v1.6</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
body{font-family:sans-serif;background:#f0fdf4}
.modal-status-btn{padding:12px;border-radius:12px;font-weight:800;font-size:11px;cursor:pointer;text-align:center}
.modal-status-btn.active{border:2px solid currentColor;transform:scale(1.05)}
</style>
</head>

<body>

<!-- MODAL -->
<div id="editModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
    <div class="bg-white p-6 rounded-2xl w-[350px]">
        <h3 id="modalTitle" class="text-sm font-bold mb-4"></h3>
        <div id="modalContent"></div>

        <div class="flex gap-2 mt-6">
            <button onclick="saveEdit()" class="flex-1 bg-green-500 text-white p-3 rounded-xl">Salvar</button>
            <button onclick="closeModal()" class="flex-1 bg-gray-200 p-3 rounded-xl">Fechar</button>
        </div>
    </div>
</div>

<script>
let rawData = [];
let currentEditTarget = {};
let selectedModalStatus = "concluido";


// =============================
// 🔥 MODAL COMPLETO ATUALIZADO
// =============================
function openEditCell(r, c){
    if(c === 'CLIENTE') return;

    currentEditTarget = {r,c};
    const v = rawData[r][c];

    const isAnalise = v === "ANALISE";
    const isAndamento = v === "EM ANDAMENTO";
    const isDate = v instanceof Date;

    selectedModalStatus = isAnalise ? "analise" : isAndamento ? "andamento" : "concluido";

    document.getElementById("modalTitle").innerText = rawData[r].CLIENTE + " - " + c;

    document.getElementById("modalContent").innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">

            <div onclick="selectModalStatus('analise')" id="status-analise"
                class="modal-status-btn ${isAnalise ? 'active':''}"
                style="background:#fff7ed;color:#ea580c">
                📋 ANÁLISE
            </div>

            <div onclick="selectModalStatus('andamento')" id="status-andamento"
                class="modal-status-btn ${isAndamento ? 'active':''}"
                style="background:#f5f3ff;color:#7c3aed">
                ⚡ ANDAMENTO
            </div>

            <div onclick="selectModalStatus('concluido')" id="status-concluido"
                class="modal-status-btn ${(!isAnalise && !isAndamento)?'active':''}"
                style="background:#ecfdf5;color:#059669">
                ✅ CONCLUÍDO
            </div>

        </div>

        <div id="dateFieldContainer" style="display:${(!isAnalise && !isAndamento)?'block':'none'}">
            <input type="date" id="editVal"
                value="${isDate ? v.toISOString().split('T')[0] : ''}"
                style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px">
        </div>
    `;

    document.getElementById("editModal").classList.remove("hidden");
}


// =============================
// 🔥 SELEÇÃO DE STATUS
// =============================
function selectModalStatus(status){
    selectedModalStatus = status;

    document.querySelectorAll(".modal-status-btn").forEach(btn=>{
        btn.classList.remove("active");
    });

    document.getElementById("status-"+status).classList.add("active");

    const dateBox = document.getElementById("dateFieldContainer");
    if(dateBox){
        dateBox.style.display = status === "concluido" ? "block":"none";
    }
}


// =============================
// 🔥 SALVAR
// =============================
function saveEdit(){
    const {r,c} = currentEditTarget;

    if(selectedModalStatus === "analise"){
        rawData[r][c] = "ANALISE";

    } else if(selectedModalStatus === "andamento"){
        rawData[r][c] = "EM ANDAMENTO";

    } else {
        const val = document.getElementById("editVal").value;
        if(val){
            rawData[r][c] = new Date(val+"T12:00:00");
        }
    }

    // 🔥 ENVIO PARA GOOGLE SCRIPT
    fetch("SUA_URL_SCRIPT_GOOGLE",{
        method:"POST",
        mode:"no-cors",
        body:JSON.stringify({
            cliente: rawData[r].CLIENTE,
            coluna: c,
            novaData: rawData[r][c]
        })
    });

    closeModal();
}


// =============================
function closeModal(){
    document.getElementById("editModal").classList.add("hidden");
}
</script>

</body>
</html>
