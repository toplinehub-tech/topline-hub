<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopLineHub | Versão Corrigida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-emerald-50">
    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="fixed inset-0 bg-gradient-to-br from-emerald-50 to-white flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 shadow-xl max-w-md w-full mx-4 text-center">
            <h1 class="text-3xl font-black mb-6"><span class="text-slate-700">TopLine</span><span class="text-emerald-600">Hub</span></h1>
            <p class="text-slate-500 text-sm mb-6">Acesso ao Sistema</p>
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="login('Ingrid')" class="px-5 py-2 bg-white border-2 border-emerald-300 rounded-full text-sm font-semibold text-emerald-700 hover:bg-emerald-50">Ingrid</button>
                <button onclick="login('Sirlene')" class="px-5 py-2 bg-white border-2 border-emerald-300 rounded-full text-sm font-semibold text-emerald-700 hover:bg-emerald-50">Sirlene</button>
                <button onclick="login('Patricia')" class="px-5 py-2 bg-white border-2 border-emerald-300 rounded-full text-sm font-semibold text-emerald-700 hover:bg-emerald-50">Patricia</button>
                <button onclick="login('Jordan')" class="px-5 py-2 bg-white border-2 border-emerald-300 rounded-full text-sm font-semibold text-emerald-700 hover:bg-emerald-50">Jordan</button>
                <button onclick="login('Nikolas')" class="px-5 py-2 bg-white border-2 border-emerald-300 rounded-full text-sm font-semibold text-emerald-700 hover:bg-emerald-50">Nikolas</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" style="display:none" class="p-6 max-w-[1600px] mx-auto">
        <div class="bg-white rounded-xl shadow-sm p-5 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black cursor-pointer" onclick="location.reload()"><span class="text-slate-700">TopLine</span><span class="text-emerald-600">Hub</span></h1>
                <div class="flex gap-4 mt-2">
                    <button onclick="switchTab('dash')" id="tabDash" class="text-xs font-bold uppercase pb-1 border-b-2 border-emerald-500 text-emerald-700">Painel</button>
                    <button onclick="switchTab('tasks')" id="tabTasks" class="text-xs font-bold uppercase pb-1 text-slate-400">Tarefas</button>
                    <button onclick="switchTab('senhas')" id="tabSenhas" class="text-xs font-bold uppercase pb-1 text-slate-400">Senhas</button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="bg-slate-100 px-4 py-2 rounded-full text-sm font-semibold" id="userName"></span>
                <button onclick="logout()" class="text-red-500 text-sm">Sair</button>
            </div>
        </div>

        <!-- PAINEL -->
        <div id="viewDash">
            <div class="bg-white rounded-xl p-6 mb-6">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-4">Resumo Geral</h3>
                <div class="grid grid-cols-3 gap-4">
                    <div class="text-center p-4 bg-red-50 rounded-xl"><span class="block text-2xl font-black text-red-600" id="countVencido">0</span><span class="text-xs">Vencidos</span></div>
                    <div class="text-center p-4 bg-purple-50 rounded-xl"><span class="block text-2xl font-black text-purple-600" id="countAndamento">0</span><span class="text-xs">Andamento</span></div>
                    <div class="text-center p-4 bg-orange-50 rounded-xl"><span class="block text-2xl font-black text-orange-600" id="countAnalise">0</span><span class="text-xs">Análise</span></div>
                </div>
            </div>
            <div class="bg-white rounded-xl overflow-hidden">
                <div class="overflow-auto max-h-[500px]">
                    <table class="w-full text-left text-xs">
                        <thead id="tableHeader" class="bg-slate-50 sticky top-0"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- TAREFAS -->
        <div id="viewTasks" style="display:none">
            <div class="bg-white rounded-xl p-4 mb-6">
                <div class="flex gap-3 justify-center flex-wrap">
                    <button onclick="distribuirTarefas('vencido')" id="btnVencido" class="px-4 py-2 bg-red-50 border border-red-200 rounded-lg text-xs font-bold text-red-700">Sortear Vencidas</button>
                    <button onclick="distribuirTarefas('30')" id="btn30" class="px-4 py-2 bg-amber-50 border border-amber-200 rounded-lg text-xs font-bold text-amber-700">Sortear 30 D</button>
                    <button onclick="distribuirTarefas('60')" id="btn60" class="px-4 py-2 bg-emerald-50 border border-emerald-200 rounded-lg text-xs font-bold text-emerald-700">Sortear 60 D</button>
                    <button onclick="distribuirTarefas('90')" id="btn90" class="px-4 py-2 bg-sky-50 border border-sky-200 rounded-lg text-xs font-bold text-sky-700">Sortear 90 D</button>
                </div>
                <div id="sorteioInfo" class="text-center mt-3 text-xs text-slate-500"></div>
            </div>
            <div class="grid grid-cols-3 gap-6">
                <div class="bg-white rounded-xl p-5 border-t-8 border-blue-400 min-h-[400px]"><h3 class="font-bold mb-4 text-blue-600">Jordan <span id="countJordan" class="float-right">0</span></h3><div id="listJordan" class="space-y-2"></div></div>
                <div class="bg-white rounded-xl p-5 border-t-8 border-purple-400 min-h-[400px]"><h3 class="font-bold mb-4 text-purple-600">Silene <span id="countSilene" class="float-right">0</span></h3><div id="listSilene" class="space-y-2"></div></div>
                <div class="bg-white rounded-xl p-5 border-t-8 border-pink-400 min-h-[400px]"><h3 class="font-bold mb-4 text-pink-600">Patricia <span id="countPatricia" class="float-right">0</span></h3><div id="listPatricia" class="space-y-2"></div></div>
            </div>
        </div>

        <!-- SENHAS -->
        <div id="viewSenhas" style="display:none">
            <div class="bg-white rounded-xl p-6">
                <input type="text" id="searchSenhas" oninput="renderSenhas()" placeholder="Filtrar cliente..." class="w-full mb-4 p-2 border rounded-lg text-sm">
                <div class="overflow-auto max-h-[500px]">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-50"><tr><th class="sticky left-0 bg-white">CLIENTE</th><th>CNPJ</th><th>CCM</th><th>SENHA WEB</th><th>SENHA GOV</th></tr></thead>
                        <tbody id="senhasBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center"><div class="bg-white p-6 rounded-xl text-center"><div class="w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div><p class="text-sm font-bold">Processando...</p></div></div>

    <div id="toast" class="fixed bottom-6 right-6 bg-white border-l-4 border-emerald-500 shadow-lg rounded-lg p-4 z-50 hidden"><p id="toastMsg" class="text-sm font-semibold"></p></div>

    <script>
        // CONFIGURAÇÃO - COLE AQUI A URL QUE VOCÊ COPIAR DO APPS SCRIPT
        const URL_API = "https://script.google.com/macros/s/AKfycbwYqukc7b7yfJr9lzL1qdqWaSUOV2vPs3y3xRVb4pk/dev";
        
        const URL_DADOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYP4-YzYEM_345_PWgfqmlD9id6viNFT91g6BhLVEnQ1kOfwQxO5THy6Z_IpiPec5Xc2FGuAcPz6mE/pub?output=csv&gid=0";
        const URL_SENHAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYP4-YzYEM_345_PWgfqmlD9id6viNFT91g6BhLVEnQ1kOfwQxO5THy6Z_IpiPec5Xc2FGuAcPz6mE/pub?output=csv&gid=49695199";

        let dados = [], headers = [], senhas = [];
        let currentUser = "";
        let ultimoSorteio = null;

        async function login(user) {
            currentUser = user;
            document.getElementById('userName').innerHTML = `👤 ${user}`;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            await carregarDados();
            await carregarEstadoSorteio();
            setInterval(() => carregarEstadoSorteio(), 15000);
        }

        function logout() {
            currentUser = "";
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
        }

        async function carregarDados() {
            try {
                const res = await fetch(URL_DADOS + "&_=" + Date.now());
                const csv = await res.text();
                Papa.parse(csv, { header: true, dynamicTyping: true, skipEmptyLines: true, complete: (r) => {
                    dados = r.data.map(processarLinha);
                    if(dados.length) headers = Object.keys(dados[0]).filter(h => h !== 'CLIENTE_DONE');
                    renderizarTabela();
                }});
                const resSenhas = await fetch(URL_SENHAS);
                const csvSenhas = await resSenhas.text();
                Papa.parse(csvSenhas, { header: true, skipEmptyLines: true, complete: (r) => { senhas = r.data; } });
            } catch(e) { console.error(e); }
        }

        function processarLinha(row) {
            const obj = {};
            for(let k in row) {
                let val = row[k];
                if(typeof val === 'string' && val.includes('/')) {
                    let partes = val.split('/');
                    if(partes.length === 3) val = new Date(partes[2], partes[1]-1, partes[0]);
                }
                obj[k.trim().toUpperCase()] = val;
            }
            return obj;
        }

        async function carregarEstadoSorteio() {
            try {
                const res = await fetch(`${URL_API}?action=getSorteioState&_=${Date.now()}`);
                const json = await res.json();
                if(json.success && json.data) {
                    ultimoSorteio = json.data;
                    atualizarBotoesSorteio();
                    if(json.data.distribuicao) exibirDistribuicao(json.data.distribuicao);
                }
            } catch(e) { console.log('Erro ao carregar sorteio:', e); }
        }

        function atualizarBotoesSorteio() {
            const botoes = ['btnVencido', 'btn30', 'btn60', 'btn90'];
            const infoDiv = document.getElementById('sorteioInfo');
            
            if(ultimoSorteio && ultimoSorteio.timestamp && currentUser !== 'Ingrid') {
                const diffHoras = (Date.now() - ultimoSorteio.timestamp) / (1000 * 60 * 60);
                if(diffHoras < 8) {
                    infoDiv.innerHTML = `🔒 Último sorteio por ${ultimoSorteio.usuario} há ${Math.floor(diffHoras)}h - Aguarde`;
                    botoes.forEach(id => { document.getElementById(id).style.opacity = '0.5'; document.getElementById(id).style.pointerEvents = 'none'; });
                    return;
                }
            }
            infoDiv.innerHTML = '';
            botoes.forEach(id => { document.getElementById(id).style.opacity = '1'; document.getElementById(id).style.pointerEvents = 'auto'; });
        }

        function exibirDistribuicao(dist) {
            const colaboradores = ['Jordan', 'Silene', 'Patricia'];
            colaboradores.forEach(nome => {
                const key = nome.toLowerCase();
                const container = document.getElementById(`list${nome}`);
                const countSpan = document.getElementById(`count${nome}`);
                if(container && dist[key]) {
                    container.innerHTML = '';
                    countSpan.innerText = dist[key].length;
                    dist[key].forEach(t => {
                        const card = document.createElement('div');
                        card.className = 'p-3 bg-white border rounded-lg text-xs cursor-pointer hover:shadow-md transition-all mb-2';
                        card.onclick = () => {
                            const idx = dados.findIndex(r => r.CLIENTE === t.cliente);
                            if(idx !== -1) abrirEditor(idx, t.documento);
                        };
                        card.innerHTML = `<div class="font-bold">${t.cliente}</div><div class="flex justify-between mt-1"><span class="text-emerald-600">${t.documento}</span><span class="text-slate-400">${t.prazo}</span></div>`;
                        container.appendChild(card);
                    });
                }
            });
        }

        function getStatus(val) {
            if(!val) return null;
            if(typeof val === 'string') {
                let s = val.toUpperCase();
                if(s === 'EM ANDAMENTO') return 'andamento';
                if(s === 'ANALISE') return 'analise';
            }
            if(val instanceof Date) {
                let diff = Math.ceil((val - new Date().setHours(0,0,0,0)) / 86400000);
                if(diff < 0) return 'vencido';
                if(diff <= 30) return '30';
                if(diff <= 60) return '60';
                if(diff <= 90) return '90';
            }
            return null;
        }

        function renderizarTabela() {
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            if(!headers.length) return;
            thead.innerHTML = `<tr>${headers.map(h => `<th class="p-2 ${h === 'CLIENTE' ? 'sticky left-0 bg-white' : ''}">${h}</th>`).join('')}</tr>`;
            tbody.innerHTML = dados.map((row, idx) => `<tr>${headers.map(h => {
                const val = row[h] instanceof Date ? row[h].toLocaleDateString('pt-BR') : (row[h] || '-');
                const status = getStatus(row[h]);
                let bg = '';
                if(status === 'vencido') bg = 'bg-red-50 text-red-700';
                else if(status === '30') bg = 'bg-amber-50 text-amber-700';
                else if(status === '60') bg = 'bg-emerald-50 text-emerald-700';
                else if(status === '90') bg = 'bg-sky-50 text-sky-700';
                else if(status === 'andamento') bg = 'bg-purple-50 text-purple-700';
                else if(status === 'analise') bg = 'bg-orange-50 text-orange-700';
                return `<td class="p-2 border-b ${h === 'CLIENTE' ? 'sticky left-0 bg-white font-bold' : ''} ${bg} cursor-pointer" onclick="abrirEditor(${idx}, '${h}')">${val}</td>`;
            }).join('')}</tr>`).join('');
            atualizarResumo();
        }

        function atualizarResumo() {
            let vencido = 0, andamento = 0, analise = 0;
            dados.forEach(row => {
                headers.forEach(h => {
                    let s = getStatus(row[h]);
                    if(s === 'vencido') vencido++;
                    else if(s === 'andamento') andamento++;
                    else if(s === 'analise') analise++;
                });
            });
            document.getElementById('countVencido').innerText = vencido;
            document.getElementById('countAndamento').innerText = andamento;
            document.getElementById('countAnalise').innerText = analise;
        }

        function abrirEditor(linha, coluna) {
            if(coluna === 'CLIENTE') return;
            let valorAtual = dados[linha][coluna];
            let exibicao = valorAtual instanceof Date ? valorAtual.toLocaleDateString('pt-BR') : (valorAtual || 'vazio');
            let opcao = prompt(`Editar ${dados[linha].CLIENTE} - ${coluna}\nValor atual: ${exibicao}\n\nDigite:\n- "analise" para ANÁLISE\n- "andamento" para EM ANDAMENTO\n- ou uma data (AAAA-MM-DD)`, "");
            
            if(!opcao) return;
            
            let valorFinal = opcao;
            if(opcao.toLowerCase() === 'analise') valorFinal = "ANALISE";
            else if(opcao.toLowerCase() === 'andamento') valorFinal = "EM ANDAMENTO";
            
            dados[linha][coluna] = valorFinal;
            renderizarTabela();
            
            enviarAtualizacao(dados[linha].CLIENTE, coluna, valorFinal);
        }

        async function enviarAtualizacao(cliente, coluna, valor) {
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            try {
                const url = `${URL_API}?cliente=${encodeURIComponent(cliente)}&coluna=${encodeURIComponent(coluna)}&valor=${encodeURIComponent(valor)}&_=${Date.now()}`;
                const res = await fetch(url);
                const json = await res.json();
                mostrarToast(json.success ? '✓ Atualizado!' : '✗ Erro ao atualizar', json.success);
                if(json.success) await carregarDados();
            } catch(e) {
                mostrarToast('✗ Erro de conexão', false);
            }
            loading.style.display = 'none';
        }

        async function distribuirTarefas(status) {
            if(currentUser !== 'Ingrid') {
                mostrarToast('Apenas Ingrid pode realizar sorteios!', false);
                return;
            }
            
            if(ultimoSorteio && ultimoSorteio.timestamp) {
                let diffHoras = (Date.now() - ultimoSorteio.timestamp) / (1000 * 60 * 60);
                if(diffHoras < 8) {
                    mostrarToast(`Aguarde ${(8-diffHoras).toFixed(1)} horas para o próximo sorteio!`, false);
                    return;
                }
            }
            
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            
            try {
                let tarefasPorCliente = new Map();
                dados.forEach((row, idx) => {
                    headers.forEach(h => {
                        if(getStatus(row[h]) === status) {
                            if(!tarefasPorCliente.has(row.CLIENTE)) tarefasPorCliente.set(row.CLIENTE, []);
                            tarefasPorCliente.get(row.CLIENTE).push({
                                cliente: row.CLIENTE,
                                documento: h,
                                prazo: row[h] instanceof Date ? row[h].toLocaleDateString('pt-BR') : row[h]
                            });
                        }
                    });
                });
                
                if(tarefasPorCliente.size === 0) {
                    mostrarToast('Nenhuma tarefa encontrada!', false);
                    loading.style.display = 'none';
                    return;
                }
                
                let clientes = Array.from(tarefasPorCliente.entries());
                clientes.sort((a,b) => b[1].length - a[1].length);
                
                let distribuicao = { jordan: [], silene: [], patricia: [] };
                let cargas = { jordan: 0, silene: 0, patricia: 0 };
                
                clientes.forEach(([cliente, tarefas]) => {
                    let alvo = 'jordan';
                    if(cargas.silene < cargas[alvo]) alvo = 'silene';
                    if(cargas.patricia < cargas[alvo]) alvo = 'patricia';
                    distribuicao[alvo].push(...tarefas);
                    cargas[alvo] += tarefas.length;
                });
                
                const sorteioData = {
                    timestamp: Date.now(),
                    usuario: currentUser,
                    status: status,
                    distribuicao: distribuicao,
                    dataHora: new Date().toISOString()
                };
                
                const res = await fetch(`${URL_API}?action=saveSorteioState&data=${encodeURIComponent(JSON.stringify(sorteioData))}&_=${Date.now()}`);
                const json = await res.json();
                
                if(json.success) {
                    ultimoSorteio = sorteioData;
                    atualizarBotoesSorteio();
                    exibirDistribuicao(distribuicao);
                    mostrarToast(`✓ Sorteio de ${status} concluído!`, true);
                } else {
                    mostrarToast('✗ ' + (json.error || 'Erro ao salvar'), false);
                }
            } catch(e) {
                mostrarToast('✗ Erro: ' + e.message, false);
            }
            loading.style.display = 'none';
        }

        function mostrarToast(msg, sucesso) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.innerText = msg;
            toast.style.borderLeftColor = sucesso ? '#10b981' : '#ef4444';
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function renderSenhas() {
            let filtro = document.getElementById('searchSenhas').value.toLowerCase();
            let tbody = document.getElementById('senhasBody');
            if(!senhas.length) return;
            tbody.innerHTML = senhas.filter(s => s.CLIENTE?.toLowerCase().includes(filtro)).map(s => `
                <tr><td class="sticky left-0 bg-white font-bold p-2">${s.CLIENTE || '-'}</td>
                <td class="p-2">${s.CNPJ || '-'}</td>
                <td class="p-2">${s.CCM || '-'}</td>
                <td class="p-2">${s['SENHA WEB'] || '-'}</td>
                <td class="p-2">${s['SENHA GOV'] || '-'}</td></tr>
            `).join('');
        }

        function switchTab(tab) {
            document.getElementById('viewDash').style.display = 'none';
            document.getElementById('viewTasks').style.display = 'none';
            document.getElementById('viewSenhas').style.display = 'none';
            document.getElementById('tabDash').classList.remove('border-b-2', 'border-emerald-500', 'text-emerald-700');
            document.getElementById('tabTasks').classList.remove('border-b-2', 'border-emerald-500', 'text-emerald-700');
            document.getElementById('tabSenhas').classList.remove('border-b-2', 'border-emerald-500', 'text-emerald-700');
            
            if(tab === 'dash') {
                document.getElementById('viewDash').style.display = 'block';
                document.getElementById('tabDash').classList.add('border-b-2', 'border-emerald-500', 'text-emerald-700');
            } else if(tab === 'tasks') {
                document.getElementById('viewTasks').style.display = 'block';
                document.getElementById('tabTasks').classList.add('border-b-2', 'border-emerald-500', 'text-emerald-700');
            } else {
                document.getElementById('viewSenhas').style.display = 'block';
                document.getElementById('tabSenhas').classList.add('border-b-2', 'border-emerald-500', 'text-emerald-700');
                renderSenhas();
            }
        }
    </script>
</body>
</html>
