<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopLineHub | Gestão Integrada v1.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0fdf4; color: #1e293b; margin: 0; }
        .brand-name { font-weight: 800; letter-spacing: -0.05em; display: flex; align-items: center; }
        .topline-text { color: #334155; }
        .hub-text { color: #10b981; }
        #splash-screen { position: fixed; inset: 0; z-index: 9999; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .vencido { background-color: #ffe5e5 !important; color: #b91c1c !important; }
        .vence-30 { background-color: #fff9db !important; color: #92400e !important; }
        .vence-60 { background-color: #e6fffa !important; color: #047481 !important; }
        .vence-90 { background-color: #f0f9ff !important; color: #0369a1 !important; }
        .andamento { background-color: #f5f3ff !important; color: #5b21b6 !important; }
        .analise { background-color: #fff7ed !important; color: #c2410c !important; }
        
        .white-card { background: white; border: 1px solid rgba(16, 185, 129, 0.1); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .status-btn-active { ring: 2px solid #10b981; background-color: #f8fafc; }
        .tab-active { border-bottom: 2px solid #10b981; color: #065f46 !important; }
        
        th { background: #f8fafc; padding: 12px; font-size: 9px; text-transform: uppercase; position: sticky; top: 0; z-index: 20; border-bottom: 2px solid #f1f5f9; }
        td { padding: 8px 10px; font-size: 10.5px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .col-fixed { position: sticky; left: 0; background: white !important; z-index: 10; border-right: 1px solid #e2e8f0; font-weight: 600; }
        .btn-mini { padding: 4px 12px; font-size: 9px; border-radius: 8px; font-weight: 800; text-transform: uppercase; border: 1px solid #e2e8f0; background: white; transition: all 0.2s; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="brand-name text-4xl mb-2"><span class="topline-text">TopLine</span><span class="hub-text">Hub</span></div>
        <div class="w-12 h-1 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin mt-6"></div>
    </div>

    <div class="p-6 max-w-[1600px] mx-auto">
        <header class="white-card p-5 flex justify-between items-center mb-6">
            <div>
                <div class="brand-name text-2xl cursor-pointer" onclick="window.location.reload()"><span class="topline-text">TopLine</span><span class="hub-text">Hub</span></div>
                <nav class="flex gap-6 mt-3">
                    <button onclick="switchTab('dash')" id="tab-dash" class="text-[10px] font-bold uppercase pb-1 tab-active">Painel</button>
                    <button onclick="switchTab('tasks')" id="tab-tasks" class="text-[10px] font-bold uppercase pb-1 text-slate-400">Tarefas</button>
                    <button onclick="switchTab('auditoria')" id="tab-auditoria" class="text-[10px] font-bold uppercase pb-1 text-slate-400">Auditoria</button>
                    <button onclick="switchTab('senhas')" id="tab-senhas" class="text-[10px] font-bold uppercase pb-1 text-slate-400">Senhas</button>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" id="searchInput" oninput="renderTable()" placeholder="Pesquisar cliente..." class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-xs w-[250px] outline-none focus:ring-2 ring-emerald-100">
                <button onclick="fetchGoogleSheets()" id="syncBtn" class="btn-mini text-emerald-700 bg-emerald-50 border-emerald-100 hover:bg-emerald-100">Sincronizar</button>
                <button onclick="resetFilters()" class="btn-mini text-slate-500">Limpar</button>
            </div>
        </header>

        <div id="view-dash">
            <div class="grid grid-cols-12 gap-6 mb-6">
                <div class="col-span-4 white-card p-6 flex flex-col items-center justify-center relative">
                    <div style="width: 200px; height: 200px;">
                        <canvas id="statusChart"></canvas>
                    </div>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-4">
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Pendências</span>
                        <span id="total-pendencias" class="text-4xl font-black text-slate-700">0</span>
                    </div>
                </div>
                
                <div class="col-span-8 grid grid-cols-3 gap-6">
                    <div class="white-card p-6 border-l-8 border-red-500 flex flex-col justify-center">
                        <span class="text-[10px] font-black text-red-500 uppercase">Crítico</span>
                        <h2 id="stat-vencido" class="text-5xl font-black text-slate-700 mt-1">0</h2>
                        <p class="text-[10px] text-slate-400 mt-1 font-bold">VENCIDOS</p>
                    </div>
                    <div class="white-card p-6 border-l-8 border-purple-500 flex flex-col justify-center">
                        <span class="text-[10px] font-black text-purple-500 uppercase">Produção</span>
                        <h2 id="stat-andamento" class="text-5xl font-black text-slate-700 mt-1">0</h2>
                        <p class="text-[10px] text-slate-400 mt-1 font-bold">EM ANDAMENTO</p>
                    </div>
                    <div class="white-card p-6 border-l-8 border-orange-500 flex flex-col justify-center">
                        <span class="text-[10px] font-black text-orange-500 uppercase">Triagem</span>
                        <h2 id="stat-analise" class="text-5xl font-black text-slate-700 mt-1">0</h2>
                        <p class="text-[10px] text-slate-400 mt-1 font-bold">EM ANÁLISE</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-6 gap-4 mb-4">
                <button onclick="toggleStatusFilter('vencido')" id="btn-vencido" class="white-card border-l-8 border-red-400 p-4 text-left hover:shadow-md transition-all">
                    <span class="block text-[8px] font-black text-red-500 uppercase">Filtro</span>
                    <span class="text-xs font-bold text-slate-700">Vencidos</span>
                </button>
                <button onclick="toggleStatusFilter('30')" id="btn-30" class="white-card border-l-8 border-amber-400 p-4 text-left hover:shadow-md transition-all">
                    <span class="block text-[8px] font-black text-amber-500 uppercase">Filtro</span>
                    <span class="text-xs font-bold text-slate-700">30 Dias</span>
                </button>
                <button onclick="toggleStatusFilter('60')" id="btn-60" class="white-card border-l-8 border-emerald-400 p-4 text-left hover:shadow-md transition-all">
                    <span class="block text-[8px] font-black text-emerald-500 uppercase">Filtro</span>
                    <span class="text-xs font-bold text-slate-700">60 Dias</span>
                </button>
                <button onclick="toggleStatusFilter('90')" id="btn-90" class="white-card border-l-8 border-sky-400 p-4 text-left hover:shadow-md transition-all">
                    <span class="block text-[8px] font-black text-sky-500 uppercase">Filtro</span>
                    <span class="text-xs font-bold text-slate-700">90 Dias</span>
                </button>
                <button onclick="toggleStatusFilter('andamento')" id="btn-andamento" class="white-card border-l-8 border-purple-400 p-4 text-left hover:shadow-md transition-all">
                    <span class="block text-[8px] font-black text-purple-500 uppercase">Filtro</span>
                    <span class="text-xs font-bold text-slate-700">Andamento</span>
                </button>
                <button onclick="toggleStatusFilter('analise')" id="btn-analise" class="white-card border-l-8 border-orange-400 p-4 text-left hover:shadow-md transition-all">
                    <span class="block text-[8px] font-black text-orange-500 uppercase">Filtro</span>
                    <span class="text-xs font-bold text-slate-700">Análise</span>
                </button>
            </div>

            <div class="white-card p-4 flex flex-wrap gap-2 items-center mb-6">
                <span class="text-[9px] font-black text-slate-400 uppercase mr-2 border-r pr-4">Filtrar por Documento</span>
                <div id="docButtons" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="white-card overflow-hidden">
                <div class="max-h-[500px] overflow-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="tableHeader"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-tasks" class="hidden"><div class="grid grid-cols-3 gap-6" id="tasks-container"></div></div>
        <div id="view-auditoria" class="hidden"><div id="logContainer" class="white-card p-6 space-y-2 text-xs"></div></div>
        <div id="view-senhas" class="hidden"><div class="white-card p-6 overflow-auto"><table class="w-full text-left"><tbody id="senhasBody"></tbody></table></div></div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] p-8 max-w-sm w-full shadow-2xl">
            <h4 id="modalTitle" class="text-xs font-black text-slate-800 uppercase mb-6 text-center border-b pb-4"></h4>
            <div id="modalContent" class="space-y-4"></div>
            <div class="flex gap-3 mt-8">
                <button id="modalSaveBtn" class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-bold uppercase text-[10px]">Salvar Alteração</button>
                <button onclick="closeModal()" class="px-6 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold uppercase text-[10px]">Sair</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYP4-YzYEM_345_PWgfqmlD9id6viNFT91g6BhLVEnQ1kOfwQxO5THy6Z_IpiPec5Xc2FGuAcPz6mE/pub?output=csv";
        const URL_DADOS_PRINCIPAIS = BASE_URL + "&gid=0";
        const URL_SENHAS = BASE_URL + "&gid=49695199";
        
        // URL DO SEU GOOGLE APPS SCRIPT (Verifique se é esta mesma)
        const URL_SCRIPT_GOOGLE = "https://script.google.com/macros/s/AKfycbyDnH1bPGZmuRsoyWBGm6XD0azRDC9fDuwuyEZREkTpFi4kXHLAEjxh1UZgOjqOhUXU/exec";

        let rawData = [], headers = [], passwordData = [], activeDoc = null, activeStatus = null, chartInstance = null;
        const docList = ["ATA", "CRED.", "CENTS", "CTM", "CND", "CMDCA", "UTILIDADE", "CERTIF.DIGITAL", "COMAS", "COVISA"];

        window.onload = () => {
            initChart();
            renderDocButtons();
            fetchGoogleSheets();
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 1200);
        };

        async function fetchGoogleSheets() {
            try {
                const res = await fetch(URL_DADOS_PRINCIPAIS);
                const csv = await res.text();
                Papa.parse(csv, {
                    header: true, skipEmptyLines: true,
                    complete: (results) => {
                        rawData = results.data.map(row => {
                            let nr = {};
                            Object.keys(row).forEach(k => {
                                let key = k.trim().toUpperCase();
                                if(key === 'CRCE_1' || key === 'CERTF.DIGITAL') key = 'CERTIF.DIGITAL';
                                let val = row[k];
                                if(typeof val === 'string' && val.includes('/')) {
                                    const p = val.split('/');
                                    val = new Date(p[2], p[1]-1, p[0]);
                                }
                                nr[key] = val;
                            });
                            return nr;
                        });
                        headers = Object.keys(rawData[0]).filter(h => !h.endsWith('_DONE') && !h.endsWith('_OBS'));
                        renderTable();
                    }
                });
                const resS = await fetch(URL_SENHAS);
                const csvS = await resS.text();
                Papa.parse(csvS, { header: true, complete: r => passwordData = r.data });
            } catch (e) { console.error("Erro na carga:", e); }
        }

        function getStatus(val, row, col) {
            const str = String(val || "").toUpperCase().trim();
            if (str === "EM ANDAMENTO" || (row && row[col + "_DONE"])) return 'andamento';
            if (str === "ANALISE" || str === "ANÁLISE") return 'analise';
            if (!(val instanceof Date)) return null;
            const diff = Math.ceil((val - new Date().setHours(0,0,0,0)) / 86400000);
            if (diff < 0) return 'vencido';
            if (diff <= 30) return '30';
            if (diff <= 60) return '60';
            if (diff <= 90) return '90';
            return 'ok';
        }

        function updateDashboard() {
            let stats = { vencido: 0, andamento: 0, analise: 0 };
            rawData.forEach(row => {
                headers.forEach(h => {
                    if(h === 'CLIENTE') return;
                    const s = getStatus(row[h], row, h);
                    if(s === 'vencido') stats.vencido++;
                    if(s === 'andamento') stats.andamento++;
                    if(s === 'analise') stats.analise++;
                });
            });
            const total = stats.vencido + stats.andamento + stats.analise;
            document.getElementById('stat-vencido').innerText = stats.vencido;
            document.getElementById('stat-andamento').innerText = stats.andamento;
            document.getElementById('stat-analise').innerText = stats.analise;
            document.getElementById('total-pendencias').innerText = total;
            chartInstance.data.datasets[0].data = [stats.vencido, stats.andamento, stats.analise];
            chartInstance.update();
        }

        function initChart() {
            const ctx = document.getElementById('statusChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Vencidos', 'Andamento', 'Análise'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: ['#ef4444', '#8b5cf6', '#f97316'],
                        hoverOffset: 15, borderRadius: 8, spacing: 3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        function toggleStatusFilter(status) {
            activeStatus = (activeStatus === status) ? null : status;
            document.querySelectorAll('.grid button').forEach(b => b.classList.remove('status-btn-active'));
            if(activeStatus) document.getElementById('btn-' + status).classList.add('status-btn-active');
            renderTable();
        }

        function renderTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const body = document.getElementById('tableBody');
            const head = document.getElementById('tableHeader');
            if(!headers.length) return;
            head.innerHTML = `<tr>${headers.map(h => `<th class="${h==='CLIENTE'?'col-fixed':''}">${h}</th>`).join('')}</tr>`;
            
            const filtered = rawData.filter(row => {
                const matchSearch = row.CLIENTE?.toString().toLowerCase().includes(q);
                if(!matchSearch) return false;
                if(activeDoc) {
                    const s = getStatus(row[activeDoc], row, activeDoc);
                    if(activeStatus) return s === activeStatus;
                    return row[activeDoc] !== null && row[activeDoc] !== "";
                }
                if(activeStatus) return headers.some(h => getStatus(row[h], row, h) === activeStatus);
                return true;
            });

            body.innerHTML = filtered.map(row => `
                <tr>
                    ${headers.map(h => {
                        const s = getStatus(row[h], row, h);
                        const display = row[h] instanceof Date ? row[h].toLocaleDateString('pt-BR') : (row[h] || '-');
                        const cssClass = (s === '30' || s === '60' || s === '90') ? 'vence-'+s : (s || '');
                        return `<td class="${h==='CLIENTE'?'col-fixed':''} ${cssClass}" onclick="openEditCell(${rawData.indexOf(row)}, '${h}')">${display}</td>`;
                    }).join('')}
                </tr>
            `).join('');
            updateDashboard();
        }

        function renderDocButtons() {
            const container = document.getElementById('docButtons');
            docList.forEach(doc => {
                const btn = document.createElement('button');
                btn.className = "btn-mini doc-filter-btn";
                btn.innerText = doc;
                btn.onclick = () => {
                    activeDoc = (activeDoc === doc) ? null : doc;
                    document.querySelectorAll('.doc-filter-btn').forEach(b => b.classList.remove('bg-emerald-500', 'text-white'));
                    if(activeDoc) btn.classList.add('bg-emerald-500', 'text-white');
                    renderTable();
                };
                container.appendChild(btn);
            });
        }

        function openEditCell(r, c) {
            if(c === 'CLIENTE') return;
            const row = rawData[r];
            document.getElementById('modalTitle').innerText = row.CLIENTE;
            document.getElementById('modalContent').innerHTML = `
                <div class="bg-slate-50 p-4 rounded-2xl mb-4 text-center">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Documento</span>
                    <div class="text-sm font-black text-emerald-600">${c}</div>
                </div>
                <div class="flex items-center gap-3 p-3 border rounded-2xl mb-4">
                    <input type="checkbox" id="taskDone" class="w-5 h-5 accent-emerald-500" ${row[c+"_DONE"] ? 'checked' : ''}>
                    <label class="text-xs font-bold text-slate-600 uppercase">Marcar como Concluído</label>
                </div>
                <input type="date" id="editVal" class="w-full border p-3 rounded-2xl text-xs mb-3" value="${row[c] instanceof Date ? row[c].toISOString().split('T')[0] : ''}">
                <textarea id="editObs" placeholder="Observações..." class="w-full border p-3 rounded-2xl text-xs">${row[c+"_OBS"] || ''}</textarea>
            `;
            document.getElementById('modalSaveBtn').onclick = () => saveChanges(r, c);
            document.getElementById('editModal').classList.remove('hidden');
        }

        async function saveChanges(r, c) {
            const row = rawData[r];
            const isDone = document.getElementById('taskDone').checked;
            const dateInput = document.getElementById('editVal').value;
            const obsInput = document.getElementById('editObs').value;

            // Atualiza Localmente
            rawData[r][c + "_DONE"] = isDone;
            if(dateInput) rawData[r][c] = new Date(dateInput + "T12:00:00");
            rawData[r][c + "_OBS"] = obsInput;

            // Prepara dados para o Script (Garante os nomes de campos que o Script espera)
            const payload = {
                cliente: row.CLIENTE,
                coluna: c,
                valor: dateInput ? dateInput.split('-').reverse().join('/') : row[c],
                concluido: isDone,
                obs: obsInput
            };

            console.log("Enviando para a planilha:", payload);

            // Envio para o Google Apps Script
            try {
                fetch(URL_SCRIPT_GOOGLE, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.error("Falha no envio:", e); }

            closeModal();
            renderTable();
        }

        function resetFilters() {
            activeDoc = null; activeStatus = null;
            document.querySelectorAll('.status-btn-active').forEach(b => b.classList.remove('status-btn-active'));
            document.querySelectorAll('.doc-filter-btn').forEach(b => b.classList.remove('bg-emerald-500', 'text-white'));
            document.getElementById('searchInput').value = "";
            renderTable();
        }

        function switchTab(tab) {
            ['dash', 'tasks', 'auditoria', 'senhas'].forEach(t => {
                document.getElementById('view-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('tab-active');
            });
            document.getElementById('view-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('tab-active');
        }

        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }
    </script>
</body>
</html>
