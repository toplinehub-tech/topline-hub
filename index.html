<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopLineHub | Gestão Integrada v1.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .brand-name { font-weight: 800; letter-spacing: -0.05em; display: flex; align-items: center; }
        .topline-text { color: #334155; }
        .hub-text { color: #10b981; }
        #splash-screen { position: fixed; inset: 0; z-index: 9999; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        
        /* Status Colors */
        .vencido { background-color: #fef2f2 !important; color: #dc2626 !important; font-weight: 600; }
        .andamento { background-color: #f5f3ff !important; color: #7c3aed !important; font-weight: 600; }
        .analise { background-color: #fff7ed !important; color: #ea580c !important; font-weight: 600; }
        
        .white-card { background: white; border: 1px solid rgba(0,0,0,0.05); border-radius: 20px; box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        .tab-active { border-bottom: 2px solid #10b981; color: #059669 !important; }
        th { background: #f8fafc; padding: 12px; font-size: 10px; position: sticky; top: 0; z-index: 20; border-bottom: 1px solid #e2e8f0; }
        td { padding: 10px; font-size: 11px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
        .col-fixed { position: sticky; left: 0; background: white !important; z-index: 10; border-right: 1px solid #e2e8f0; }
        .btn-mini { padding: 6px 12px; font-size: 10px; border-radius: 10px; font-weight: 700; transition: all 0.2s; border: 1px solid #e2e8f0; background: white; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="brand-name text-4xl mb-2"><span class="topline-text">TopLine</span><span class="hub-text">Hub</span></div>
        <div class="w-12 h-1 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin mt-6"></div>
    </div>

    <div class="p-6 max-w-[1600px] mx-auto">
        <header class="white-card p-5 flex justify-between items-center mb-6">
            <div>
                <div class="brand-name text-2xl cursor-pointer"><span class="topline-text">TopLine</span><span class="hub-text">Hub</span></div>
                <nav class="flex gap-6 mt-3">
                    <button onclick="switchTab('dash')" id="tab-dash" class="text-[10px] font-bold uppercase pb-1 tab-active">Painel</button>
                    <button onclick="switchTab('tasks')" id="tab-tasks" class="text-[10px] font-bold uppercase pb-1 text-slate-400">Tarefas</button>
                    <button onclick="switchTab('auditoria')" id="tab-auditoria" class="text-[10px] font-bold uppercase pb-1 text-slate-400">Auditoria</button>
                    <button onclick="switchTab('senhas')" id="tab-senhas" class="text-[10px] font-bold uppercase pb-1 text-slate-400">Senhas</button>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" id="searchInput" oninput="renderTable()" placeholder="Pesquisar..." class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-xs w-[250px] outline-none focus:ring-2 ring-emerald-100">
                <button onclick="fetchGoogleSheets()" id="syncBtn" class="btn-mini text-emerald-700 bg-emerald-50 border-emerald-100">Sincronizar</button>
            </div>
        </header>

        <div id="view-dash">
            <div class="grid grid-cols-12 gap-6 mb-6">
                <div class="col-span-4 white-card p-6 flex items-center justify-center">
                    <div style="width: 280px; height: 280px;">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
                
                <div class="col-span-8 grid grid-cols-3 gap-4">
                    <div class="white-card p-6 border-l-4 border-red-500 bg-gradient-to-br from-white to-red-50">
                        <span class="text-[10px] font-black text-red-500 uppercase">Vencidos</span>
                        <h2 id="stat-vencido" class="text-4xl font-black mt-2">0</h2>
                        <p class="text-[10px] text-slate-400 mt-1">Processos fora do prazo</p>
                    </div>
                    <div class="white-card p-6 border-l-4 border-purple-500 bg-gradient-to-br from-white to-purple-50">
                        <span class="text-[10px] font-black text-purple-500 uppercase">Em Andamento</span>
                        <h2 id="stat-andamento" class="text-4xl font-black mt-2">0</h2>
                        <p class="text-[10px] text-slate-400 mt-1">Aguardando conclusão</p>
                    </div>
                    <div class="white-card p-6 border-l-4 border-orange-500 bg-gradient-to-br from-white to-orange-50">
                        <span class="text-[10px] font-black text-orange-500 uppercase">Em Análise</span>
                        <h2 id="stat-analise" class="text-4xl font-black mt-2">0</h2>
                        <p class="text-[10px] text-slate-400 mt-1">Triagem técnica</p>
                    </div>
                    <div class="col-span-3 white-card p-3 flex flex-wrap gap-2 items-center">
                        <span class="text-[9px] font-bold text-slate-400 ml-2 mr-2 uppercase">Filtrar Doc:</span>
                        <div id="docButtons" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </div>

            <div class="white-card overflow-hidden">
                <div class="max-h-[500px] overflow-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="tableHeader"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-tasks" class="hidden">
            <div class="white-card p-4 mb-8 flex gap-3 justify-center">
                <button onclick="distribuirTarefas('vencido')" class="btn-mini border-red-200 text-red-700">Sortear Vencidas</button>
                <button onclick="distribuirTarefas('andamento')" class="btn-mini border-purple-200 text-purple-700">Sortear Andamento</button>
            </div>
            <div class="grid grid-cols-3 gap-6">
                <div id="col-jordan" class="white-card border-t-8 border-blue-400 p-5 min-h-[400px]">
                    <h3 class="font-black text-xs uppercase mb-4 flex justify-between">Jordan <span id="count-jordan">0</span></h3>
                    <div id="list-jordan" class="space-y-2"></div>
                </div>
                <div id="col-silene" class="white-card border-t-8 border-purple-400 p-5 min-h-[400px]">
                    <h3 class="font-black text-xs uppercase mb-4 flex justify-between">Silene <span id="count-silene">0</span></h3>
                    <div id="list-silene" class="space-y-2"></div>
                </div>
                <div id="col-patricia" class="white-card border-t-8 border-pink-400 p-5 min-h-[400px]">
                    <h3 class="font-black text-xs uppercase mb-4 flex justify-between">Patricia <span id="count-patricia">0</span></h3>
                    <div id="list-patricia" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <div id="view-auditoria" class="hidden"><div id="logContainer" class="white-card p-6 space-y-2"></div></div>
        
        <div id="view-senhas" class="hidden">
            <div class="white-card p-6">
                <input type="text" id="searchSenhas" oninput="renderSenhas()" placeholder="Filtrar senhas..." class="w-full mb-4 p-2 border rounded-xl text-xs outline-none">
                <div class="overflow-auto"><table class="w-full text-left"><tbody id="senhasBody"></tbody></table></div>
            </div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] p-8 max-w-sm w-full shadow-2xl">
            <h4 id="modalTitle" class="text-xs font-black text-slate-800 uppercase mb-6 text-center border-b pb-4"></h4>
            <div id="modalContent" class="space-y-4"></div>
            <div class="flex gap-3 mt-8">
                <button id="modalSaveBtn" class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-bold uppercase text-[10px]">Salvar</button>
                <button onclick="closeModal()" class="px-6 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold uppercase text-[10px]">Sair</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYP4-YzYEM_345_PWgfqmlD9id6viNFT91g6BhLVEnQ1kOfwQxO5THy6Z_IpiPec5Xc2FGuAcPz6mE/pub?output=csv";
        const URL_DADOS_PRINCIPAIS = BASE_URL + "&gid=0";
        const URL_SENHAS = BASE_URL + "&gid=49695199";
        const URL_SCRIPT_GOOGLE = "https://script.google.com/macros/s/AKfycbyDnH1bPGZmuRsoyWBGm6XD0azRDC9fDuwuyEZREkTpFi4kXHLAEjxh1UZgOjqOhUXU/exec";

        let rawData = [], headers = [], passwordData = [], logs = [];
        let activeDoc = null;
        let chartInstance = null;

        const docList = ["ATA", "CRED.", "CENTS", "CTM", "CND", "CMDCA", "UTILIDADE", "CERTIF.DIGITAL", "COMAS", "COVISA"];

        window.onload = () => {
            initChart();
            docList.forEach(doc => {
                const btn = document.createElement('button');
                btn.className = "btn-mini doc-filter-btn";
                btn.innerText = doc;
                btn.onclick = () => {
                    activeDoc = (activeDoc === doc) ? null : doc;
                    document.querySelectorAll('.doc-filter-btn').forEach(b => b.classList.remove('bg-emerald-500', 'text-white'));
                    if(activeDoc) btn.classList.add('bg-emerald-500', 'text-white');
                    renderTable();
                };
                document.getElementById('docButtons').appendChild(btn);
            });
            fetchGoogleSheets();
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 1000);
        };

        async function fetchGoogleSheets() {
            try {
                const res = await fetch(URL_DADOS_PRINCIPAIS);
                const csv = await res.text();
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        rawData = results.data.map(row => {
                            let nr = {};
                            Object.keys(row).forEach(k => {
                                let key = k.trim().toUpperCase();
                                let val = row[k];
                                if(typeof val === 'string' && val.includes('/')) {
                                    const p = val.split('/');
                                    val = new Date(p[2], p[1]-1, p[0]);
                                }
                                nr[key] = val;
                            });
                            return nr;
                        });
                        headers = Object.keys(rawData[0]).filter(h => !h.endsWith('_DONE') && !h.endsWith('_OBS'));
                        renderTable();
                    }
                });
                
                const resS = await fetch(URL_SENHAS);
                const csvS = await resS.text();
                Papa.parse(csvS, { header: true, complete: r => passwordData = r.data });
            } catch (e) { console.error("Erro ao carregar", e); }
        }

        function getStatus(val, row, col) {
            const str = String(val || "").toUpperCase().trim();
            if (str === "EM ANDAMENTO" || (row && row[col + "_DONE"])) return 'andamento';
            if (str === "ANALISE" || str === "ANÁLISE") return 'analise';
            if (val instanceof Date) {
                const diff = Math.ceil((val - new Date().setHours(0,0,0,0)) / 86400000);
                return diff < 0 ? 'vencido' : 'ok';
            }
            return null;
        }

        function updateDashboard() {
            let stats = { vencido: 0, andamento: 0, analise: 0 };
            
            rawData.forEach(row => {
                headers.forEach(h => {
                    if(h === 'CLIENTE') return;
                    const s = getStatus(row[h], row, h);
                    if(stats[s] !== undefined) stats[s]++;
                });
            });

            document.getElementById('stat-vencido').innerText = stats.vencido;
            document.getElementById('stat-andamento').innerText = stats.andamento;
            document.getElementById('stat-analise').innerText = stats.analise;

            chartInstance.data.datasets[0].data = [stats.vencido, stats.andamento, stats.analise];
            chartInstance.update();
        }

        function initChart() {
            const ctx = document.getElementById('statusChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Vencidos', 'Andamento', 'Análise'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: ['#ef4444', '#8b5cf6', '#f97316'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { 
                        legend: { display: false }
                    }
                }
            });
        }

        function renderTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const body = document.getElementById('tableBody');
            const head = document.getElementById('tableHeader');
            
            head.innerHTML = `<tr>${headers.map(h => `<th class="${h==='CLIENTE'?'col-fixed':''}">${h}</th>`).join('')}</tr>`;
            
            const filtered = rawData.filter(row => {
                const matchSearch = row.CLIENTE?.toString().toLowerCase().includes(q);
                if(activeDoc) return matchSearch && row[activeDoc];
                return matchSearch;
            });

            body.innerHTML = filtered.map((row, rIdx) => `
                <tr>
                    ${headers.map(h => {
                        const s = getStatus(row[h], row, h);
                        const display = row[h] instanceof Date ? row[h].toLocaleDateString('pt-BR') : (row[h] || '-');
                        return `<td class="${h==='CLIENTE'?'col-fixed':''} ${s||''}" onclick="openEditCell(${rawData.indexOf(row)}, '${h}')">${display}</td>`;
                    }).join('')}
                </tr>
            `).join('');
            
            updateDashboard();
        }

        function openEditCell(r, c) {
            if(c === 'CLIENTE') return;
            const row = rawData[r];
            document.getElementById('modalTitle').innerText = row.CLIENTE;
            document.getElementById('modalContent').innerHTML = `
                <div class="bg-slate-50 p-4 rounded-2xl mb-4 text-center">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Documento</span>
                    <div class="text-sm font-black text-emerald-600">${c}</div>
                </div>
                <div class="flex items-center gap-3 p-3 border rounded-2xl">
                    <input type="checkbox" id="taskDone" class="w-5 h-5 accent-emerald-500" ${row[c+"_DONE"] ? 'checked' : ''}>
                    <label class="text-xs font-bold text-slate-600 uppercase">Marcar como Concluído</label>
                </div>
                <input type="date" id="editVal" class="w-full border p-3 rounded-2xl text-xs" value="${row[c] instanceof Date ? row[c].toISOString().split('T')[0] : ''}">
                <textarea id="editObs" placeholder="Observações..." class="w-full border p-3 rounded-2xl text-xs">${row[c+"_OBS"] || ''}</textarea>
            `;
            document.getElementById('modalSaveBtn').onclick = () => saveEdit(r, c);
            document.getElementById('editModal').classList.remove('hidden');
        }

        async function saveEdit(r, c) {
            const isDone = document.getElementById('taskDone').checked;
            const newVal = document.getElementById('editVal').value;
            
            rawData[r][c + "_DONE"] = isDone;
            if(newVal) rawData[r][c] = new Date(newVal + "T12:00:00");
            
            // Envio fake/post para o script
            fetch(URL_SCRIPT_GOOGLE, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ cliente: rawData[r].CLIENTE, coluna: c, concluido: isDone }) });
            
            closeModal();
            renderTable(); // Isso já chama updateDashboard()
        }

        function switchTab(tab) {
            ['dash', 'tasks', 'auditoria', 'senhas'].forEach(t => {
                document.getElementById('view-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('tab-active');
            });
            document.getElementById('view-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('tab-active');
        }

        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }
    </script>
</body>
</html>
